<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GTA VI — топ мемов дня</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #0f1115;
    --card: #171a21;
    --border: #2a2e38;
    --text: #eef0f3;
    --muted: #9aa0ab;
    --accent: #ff7a45;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 40px 16px;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
  }
  .wrap { max-width: 1100px; margin: 0 auto; }
  .top-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    gap: 16px;
    flex-wrap: wrap;
    margin-bottom: 6px;
  }
  h1 { font-size: 24px; font-weight: 600; margin: 0; }
  .sub { color: var(--muted); font-size: 14px; margin-bottom: 24px; }
  select#day-select {
    background: var(--card);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 14px;
  }
  .grid {
    display: flex;
    flex-direction: column;
    gap: 28px;
  }
  .card {
    position: relative;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    display: flex;
    flex-direction: row;
  }
  .rank {
    position: absolute;
    top: 12px;
    left: 12px;
    width: 34px;
    height: 34px;
    border-radius: 50%;
    background: var(--accent);
    color: #1a1a1a;
    font-weight: 700;
    font-size: 15px;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1;
  }
  .thumb-link {
    display: block;
    background: #0a0b0e;
    flex: 0 0 420px;
  }
  .thumb {
    width: 100%;
    height: 100%;
    min-height: 320px;
    object-fit: cover;
    display: block;
  }
  .thumb.broken {
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    font-size: 56px;
    min-height: 320px;
  }
  .card-body { padding: 24px 28px; display: flex; flex-direction: column; gap: 14px; flex: 1; min-width: 0; }
  .caption { font-size: 18px; line-height: 1.6; margin: 0; white-space: pre-line; }
  .meta {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    font-size: 13px;
    color: var(--muted);
    margin-top: auto;
  }
  .pill {
    background: rgba(255, 122, 69, 0.12);
    color: var(--accent);
    border-radius: 6px;
    padding: 3px 9px;
  }
  .links { font-size: 13px; }
  .links a { color: #7fb8ff; text-decoration: none; }
  .links a:hover { text-decoration: underline; }
  @media (max-width: 720px) {
    .card { flex-direction: column; }
    .thumb-link { flex: none; }
    .thumb, .thumb.broken { min-height: 220px; }
    .card-body { padding: 18px 20px; }
    .caption { font-size: 16px; }
  }
  .empty { color: var(--muted); font-size: 14px; padding: 20px 0; }
  footer { margin-top: 32px; font-size: 12px; color: var(--muted); text-align: center; }
</style>
</head>
<body>
<div class="wrap">
  <div class="top-row">
    <h1>GTA VI — топ мемов дня</h1>
    <select id="day-select"></select>
  </div>
  <div class="sub" id="sub">Загрузка...</div>
  <div class="grid" id="cards"></div>
  <footer>Собрано автоматически из Reddit (r/GTA6 и др.), отобрано и подписано Claude · обновляется раз в сутки · порядок — по популярности за день по версии Reddit (точные числа реакций Reddit не отдаёт без ключа)</footer>
</div>
<script>
const MONTHS_RU = ["января","февраля","марта","апреля","мая","июня","июля","августа","сентября","октября","ноября","декабря"];

function formatDateRu(iso) {
  const [y, m, d] = iso.split("-").map(Number);
  return `${d} ${MONTHS_RU[m - 1]} ${y}`;
}

function escapeHtml(s) {
  if (s === null || s === undefined) return "";
  return String(s)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

function renderMemes(memes) {
  const container = document.getElementById("cards");
  if (!memes || memes.length === 0) {
    container.innerHTML = '<div class="empty">За этот день мемов нет.</div>';
    return;
  }
  container.innerHTML = memes.map((m, i) => {
    const img = escapeHtml(m.image_url);
    const postUrl = escapeHtml(m.post_url);
    return `
      <div class="card">
        <div class="rank">${i + 1}</div>
        <a class="thumb-link" href="${postUrl}" target="_blank" rel="noopener">
          <img class="thumb" src="${img}" loading="lazy" alt="мем GTA VI"
               onerror="this.outerHTML='<div class=&quot;thumb broken&quot;>🖼️</div>'">
        </a>
        <div class="card-body">
          <p class="caption">${escapeHtml(m.caption_ru)}</p>
          <div class="meta">
            <span class="pill">#${i + 1} по популярности</span>
            <span>${escapeHtml(m.subreddit)}</span>
            <span>${m.date ? formatDateRu(m.date) : ""}</span>
          </div>
          <div class="links"><a href="${postUrl}" target="_blank" rel="noopener">Открыть на Reddit →</a></div>
        </div>
      </div>`;
  }).join("");
}

async function loadDay(iso) {
  document.getElementById("sub").textContent = `Мемы за ${formatDateRu(iso)} · загрузка...`;
  try {
    const res = await fetch(`archive/${iso}.json`);
    if (!res.ok) throw new Error("not found");
    const memes = await res.json();
    renderMemes(memes);
    document.getElementById("sub").textContent =
      `Мемы за ${formatDateRu(iso)} · всего: ${memes.length}`;
  } catch (e) {
    document.getElementById("cards").innerHTML =
      '<div class="empty">Не удалось загрузить данные за этот день.</div>';
    document.getElementById("sub").textContent = `Мемы за ${formatDateRu(iso)}`;
  }
}

async function init() {
  const select = document.getElementById("day-select");
  try {
    const res = await fetch("manifest.json");
    const dates = await res.json();
    if (!dates.length) {
      document.getElementById("sub").textContent = "Архив пока пуст.";
      return;
    }
    select.innerHTML = dates.map(d => `<option value="${d}">${formatDateRu(d)}</option>`).join("");
    select.addEventListener("change", e => loadDay(e.target.value));
    await loadDay(dates[0]);
  } catch (e) {
    document.getElementById("sub").textContent = "Не удалось загрузить список дней (manifest.json).";
  }
}

init();
</script>
</body>
</html>
